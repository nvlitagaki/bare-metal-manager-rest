apiVersion: v2
name: carbide-rest
description: Umbrella chart for the Carbide REST API platform
type: application
version: 0.1.5
appVersion: "1.2.1"
keywords:
  - carbide
  - forge
  - bare-metal
  - rest
  - umbrella

dependencies:
  - name: carbide-rest-common
    version: "0.1.0"
    condition: carbide-rest-common.enabled
  - name: carbide-rest-cert-manager
    version: "0.1.0"
    condition: carbide-rest-cert-manager.enabled
  - name: carbide-rest-api
    version: "0.1.0"
    condition: carbide-rest-api.enabled
  - name: carbide-rest-workflow
    version: "0.1.0"
    condition: carbide-rest-workflow.enabled
  - name: carbide-rest-site-manager
    version: "0.1.0"
    condition: carbide-rest-site-manager.enabled
  - name: carbide-rest-db
    version: "0.1.0"
    condition: carbide-rest-db.enabled
